name: ci

# Per-push safety net: release.yml runs this same gate but ONLY on v* tags, so
# ordinary commits -- including master -> winc-jobdar merges, where breakage
# hides -- never saw CI. This runs the identical steps on every push/PR to the
# two long-lived branches. Keep the go-version in lockstep with release.yml.
on:
  push:
    branches: [master, winc-jobdar]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: gofmt gate
        if: runner.os == 'Linux'
        shell: bash
        run: |
          out=$(gofmt -l ./cmd ./internal)
          if [ -n "$out" ]; then
            echo "gofmt needed on:" && echo "$out" && exit 1
          fi
      - name: Vet
        run: go vet ./cmd/... ./internal/...
      - name: Test
        run: go test ./cmd/... ./internal/...
      - name: Build
        run: go build ./cmd/winc
